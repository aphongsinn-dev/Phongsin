<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Profile | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #7c3aed; /* Tím hiện đại */
            --accent-glow: rgba(124, 58, 237, 0.5);
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent; /* Sửa lỗi viền xanh trên Mobile */
        }

        body {
            background-color: var(--bg);
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Giữ các đốm sáng không bị tràn */
        }

        /* Đốm sáng nền (Gradient Orbs) */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: move 10s infinite alternate;
        }
        .orb-1 { background: var(--accent); top: -10%; left: -10%; }
        .orb-2 { background: #3b82f6; bottom: -10%; right: -10%; animation-delay: 2s; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* Avatar sửa lỗi tỉ lệ */
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover .avatar {
            transform: scale(1.1) rotate(5deg);
            border-color: var(--accent);
        }

        h1 {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .tag {
            display: inline-block;
            background: rgba(124, 58, 237, 0.1);
            color: #a78bfa;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .links {
            display: grid;
            gap: 12px;
        }

        .link {
            text-decoration: none;
            color: #d1d5db;
            background: rgba(255, 255, 255, 0.05);
            padding: 14px;
            border-radius: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        /* Hiệu ứng hover cho nút - Sửa lỗi nhạt nhòa */
        .link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        /* Nút chính nổi bật */
        .link.primary {
            background: white;
            color: black;
            margin-top: 10px;
        }

        .link.primary:hover {
            background: #e5e7eb;
            box-shadow: 0 10px 15px -3px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
        <div class="avatar-container">
            <img src="https://i.pravatar.cc/300" alt="Profile" class="avatar">
        </div>
        
        <h1>Tên Bạn</h1>
        <span class="tag">Digital Nomad & Coder</span>

        <div class="links">
            <a href="#" class="link">My Projects</a>
            <a href="#" class="link">Read My Blog</a>
            <a href="#" class="link">GitHub</a>
            <a href="mailto:hello@example.com" class="link primary">Say Hello!</a>
        </div>
    </div>

</body>
</html>
